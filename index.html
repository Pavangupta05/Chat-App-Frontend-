<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b141a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="A modern Telegram-style chat application with real-time messaging, audio calls, and advanced features" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TalkNow+" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>TalkNow+</title>
  </head>
    <style>
      #app-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999;
        color: white; font-family: -apple-system, system-ui, sans-serif;
      }
    .loader-spinner {
        width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
        border-top: 3px solid #0b141a; border-radius: 50%;
        animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      #failsafe-btn {
        margin-top: 30px; padding: 12px 24px; background: #0b141a;
        color: white; border: none; border-radius: 8px; font-weight: 600;
        display: none; cursor: pointer;
      }
    </style>
  <body>
    <div id="app-loader">
      <div class="loader-spinner"></div>
      <div id="loader-status">Initializing TalkNow+...</div>
      <button id="failsafe-btn" onclick="clearAllData()">Failsafe App Reset</button>
    </div>

    <script>
      window.global = window;
      window.process = { env: {} };
    </script>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      // 🚀 BOOTSTRAP VERSION (Deep Purge for v4.0.0)
      const APP_VERSION = '4.0.1'; 
      
      async function clearAllData() {
        if (document.getElementById('loader-status')) {
          document.getElementById('loader-status').innerText = 'Wiping everything...';
        }
        
        // 1. Storage
        try { sessionStorage.clear(); localStorage.clear(); } catch(e){}
        
        // 2. Cache API
        if ('caches' in window) {
          try {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map(name => caches.delete(name)));
          } catch (e) {}
        }

        // 3. Service Workers
        if ('serviceWorker' in navigator) {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(reg => reg.unregister()));
          } catch (e) {}
        }

        // 4. IndexedDB (The "Deep" part)
        if (window.indexedDB) {
          try {
            const dbs = await indexedDB.databases?.();
            if (dbs) {
              dbs.forEach(db => indexedDB.deleteDatabase(db.name));
            }
          } catch (e) {}
        }
        
        localStorage.setItem('chat_app_version', APP_VERSION);
        window.location.replace(window.location.origin + window.location.pathname + '?reset=' + Date.now());
      }

      // Initialize
      (async () => {
        const lastVersion = localStorage.getItem('chat_app_version');
        
        // Watchdog: If app hasn't cleared loader after 15s, show warning
        setTimeout(() => {
          const btn = document.getElementById('failsafe-btn');
          const status = document.getElementById('loader-status');
          if (btn && btn.style.display !== 'none' || document.getElementById('app-loader')) {
            if (btn) btn.style.display = 'block';
            if (status) status.innerHTML = '<span style="color:#ffb300">⚠️ App is taking too long to mount. Check your internet or refresh.</span>';
          }
        }, 15000);

        if (lastVersion !== APP_VERSION) {
          await clearAllData();
          return;
        }

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw-v4-0-1.js?v=' + APP_VERSION).then(reg => {
              console.log('📡 SW Active');
            }).catch(() => {});
          });
        }
      })();

      // Global error tracker
      window.onerror = function(msg, url, line) {
        const status = document.getElementById('loader-status');
        if (status) {
          status.innerHTML = `<span style="color:#ff4d4d">Fatal Error: ${msg}</span><br/><small style="color:#888">${url}:${line}</small>`;
          const btn = document.getElementById('failsafe-btn');
          if (btn) btn.style.display = 'block';
        }
        return false;
      };

      // Function to hide loader (called from React)
      window.hideAppLoader = function() {
        const loader = document.getElementById('app-loader');
        if (loader) {
          console.log("✅ Hiding app loader");
          loader.style.opacity = '0';
          setTimeout(() => {
            if (loader.parentNode) loader.remove();
          }, 500);
        }
      };
    </script>
  </body>
</html>
