<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3390ec" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="A modern Telegram-style chat application with real-time messaging, audio calls, and advanced features" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChatApp" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192x192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <title>Neon Relay Chat</title>
  </head>
  <body>
    <script>
      window.global = window;
      window.process = { env: {} };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // 🚀 BOOTSTRAP VERSION (Update this significantly to force-clear ALL browser state)
      const APP_VERSION = '3.0.0'; 
      
      async function clearAllData() {
        console.warn('🗑️ Critical version change! Performing full storage and cache reset...');
        
        // 1. Clear Storage
        sessionStorage.clear();
        localStorage.clear();
        
        // 2. Clear Caches API (extremely important for service workers)
        if ('caches' in window) {
          try {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map(name => caches.delete(name)));
            console.log('✅ Browser caches cleared');
          } catch (e) { console.error('Error clearing caches:', e); }
        }

        // 3. Unregister all service workers
        if ('serviceWorker' in navigator) {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(reg => reg.unregister()));
            console.log('✅ Service workers unregistered');
          } catch (e) { console.error('Error unregistering workers:', e); }
        }
        
        localStorage.setItem('chat_app_version', APP_VERSION);
        console.log('✨ Reset complete. Reloading...');
        
        // Hard reload
        window.location.reload(true);
      }

      // Initialize Cleanup/Registration
      (async () => {
        const lastVersion = localStorage.getItem('chat_app_version');
        
        if (lastVersion !== APP_VERSION) {
          await clearAllData();
          return; // Stop execution, reload will handle it
        }

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw-v4.js').then(reg => {
              console.log('📡 ServiceWorker active:', reg.scope);
            }).catch(err => {
              console.warn('❌ ServiceWorker registration failed:', err);
            });
          });
        }
      })();
      
      // PWA install prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        const installBtn = document.getElementById('install-app-btn');
        if (installBtn) {
          installBtn.style.display = 'block';
        }
      });
    </script>
  </body>
</html>
